services:
  backend:
    image: reverie-backend:latest
    build:
      context: ./backend
    environment:
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL:-https://dashscope-intl.aliyuncs.com/compatible-mode/v1}
      CHAT_MODEL: ${CHAT_MODEL:-qwen-plus}
      OBSERVER_MODEL: ${OBSERVER_MODEL:-qwen-flash}
      DREAM_MODEL: ${DREAM_MODEL:-qwen-max}
      EMBED_MODEL: ${EMBED_MODEL:-text-embedding-v4}
      JUDGE_MODEL: ${JUDGE_MODEL:-qwen-max}
      DB_PATH: /app/data/reverie.db
      DEMO_MODE: ${DEMO_MODE:-true}
      MOCK_LLM: ${MOCK_LLM:-false}
      CLOCK_OFFSET_SECONDS: ${CLOCK_OFFSET_SECONDS:-0}
      CONTEXT_BUDGET_TOKENS: ${CONTEXT_BUDGET_TOKENS:-1200}
      EMBED_DIM: ${EMBED_DIM:-1024}
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"

  frontend:
    image: reverie-frontend:latest
    build:
      context: ./frontend
      args:
        # Build-time only: Next.js inlines NEXT_PUBLIC_* during `npm run build`.
        # For a public deploy behind nginx, build with NEXT_PUBLIC_API_BASE=/
        # so the browser uses relative /api URLs proxied by nginx.
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./docs/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
